<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker - Precision Fiscal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Precision Fiscal Color System */
      --surface: #121414;
      --surface-dim: #121414;
      --surface-bright: #393939;
      --surface-container-lowest: #0d0e0f;
      --surface-container-low: #1b1c1c;
      --surface-container: #1f2020;
      --surface-container-high: #292a2a;
      --surface-container-highest: #343535;
      --on-surface: #e3e2e2;
      --on-surface-variant: #c6c6c6;
      --inverse-surface: #e3e2e2;
      --inverse-on-surface: #303031;
      --outline: #919191;
      --outline-variant: #474747;
      --surface-tint: #b0c6ff;
      --primary: #b0c6ff;
      --on-primary: #002d6f;
      --primary-container: #1a438f;
      --on-primary-container: #d9e2ff;
      --inverse-primary: #375ca8;
      --secondary: #bfc6dc;
      --on-secondary: #293041;
      --secondary-container: #3f4759;
      --on-secondary-container: #dbe2f9;
      --tertiary: #e0bbde;
      --on-tertiary: #412742;
      --tertiary-container: #593d5a;
      --on-tertiary-container: #fed7fa;
      --error: #ffb4ab;
      --on-error: #690005;
      --error-container: #93000a;
      --on-error-container: #ffdad6;
      --background: #121414;
      --on-background: #e3e2e2;
      
      /* Spacing */
      --spacing-base: 4px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 48px;
      --container-max: 1440px;
      --gutter: 24px;
      
      /* Radius */
      --radius-sm: 0.125rem;
      --radius-base: 0.25rem;
      --radius-md: 0.375rem;
      --radius-lg: 0.5rem;
      --radius-xl: 0.75rem;
      --radius-full: 9999px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      color: var(--on-surface);
      background: linear-gradient(135deg, #0a0b0c 0%, #1a1d1f 25%, #121414 50%, #0f1113 75%, #1a1c1e 100%);
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: 0;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(176, 198, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(224, 187, 222, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body > * {
      position: relative;
      z-index: 1;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    /* Typography System */
    .display-lg {
      font-family: 'Inter', sans-serif;
      font-size: 36px;
      font-weight: 700;
      line-height: 44px;
      letter-spacing: -0.02em;
    }

    .display-lg-mobile {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 34px;
      letter-spacing: -0.01em;
    }

    .headline-md {
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 600;
      line-height: 32px;
      letter-spacing: -0.01em;
    }

    .title-sm {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 600;
      line-height: 28px;
    }

    .body-md {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
    }

    .body-sm {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
    }

    .label-caps {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      line-height: 16px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .mono-data {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
    }

    /* Buttons */
    button {
      border: none;
      border-radius: var(--radius-base);
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Primary Button */
    button:not(.secondary):not(.danger) {
      background: var(--primary);
      color: var(--on-primary);
      font-weight: 600;
    }

    button:not(.secondary):not(.danger):hover:not(:disabled) {
      background: #a0b6ef;
      box-shadow: 0 2px 8px rgba(176, 198, 255, 0.2);
    }

    button:not(.secondary):not(.danger):focus:not(:disabled) {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    /* Secondary Button */
    button.secondary {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--outline-variant);
    }

    button.secondary:hover:not(:disabled) {
      background: var(--surface-container);
      border-color: var(--outline);
    }

    button.secondary:focus:not(:disabled) {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    /* Danger Button */
    button.danger {
      background: var(--error-container);
      color: var(--on-error-container);
      font-weight: 600;
    }

    button.danger:hover:not(:disabled) {
      background: #a00f17;
    }

    button.danger:focus:not(:disabled) {
      outline: 2px solid var(--error);
      outline-offset: 2px;
    }

    /* Form Elements */
    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-base);
      padding: 10px 12px;
      color: var(--on-surface);
      background: var(--surface-container-low);
      transition: all 0.2s ease;
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--on-surface-variant);
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface-container);
      box-shadow: 0 0 0 2px rgba(176, 198, 255, 0.15), inset 0 0 0 1px var(--primary);
    }

    label {
      display: block;
      margin-bottom: var(--spacing-sm);
      color: var(--on-surface-variant);
      font-size: 12px;
      font-weight: 600;
      line-height: 16px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .form {
      display: grid;
      gap: var(--spacing-md);
    }

    label > input,
    label > textarea,
    label > select {
      margin-top: var(--spacing-sm);
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background: var(--surface-container);
      color: var(--on-surface-variant);
      font-size: 12px;
      font-weight: 600;
      line-height: 16px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid var(--outline-variant);
      height: 52px;
    }

    td {
      padding: 16px;
      border-bottom: 1px solid var(--outline-variant);
      color: var(--on-surface);
      font-family: 'JetBrains Mono', monospace;
      height: 52px;
    }

    tr:hover {
      background: var(--surface-container-high);
    }

    /* Layout */
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      position: relative;
    }

    .sidebar {
      background: rgba(18, 20, 20, 0.8);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(145, 145, 145, 0.2);
      padding: var(--spacing-lg);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
      overflow-y: auto;
      box-shadow: inset -1px 0 0 rgba(176, 198, 255, 0.05), 0 0 1px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .sidebar::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(26, 67, 143, 0.03) 0%, transparent 100%);
      pointer-events: none;
    }

    .sidebar > * {
      position: relative;
      z-index: 1;
    }

    .brand {
      margin-bottom: var(--spacing-md);
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--primary);
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--on-surface-variant);
      font-size: 13px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-md);
    }

    .tabs button {
      padding: 10px 12px;
      background: var(--surface-container);
      color: var(--on-surface-variant);
      border: 1px solid var(--outline-variant);
      font-weight: 500;
    }

    .tabs button.active {
      background: var(--primary);
      color: var(--on-primary);
      border-color: var(--primary);
    }

    .main {
      padding: var(--spacing-lg);
      display: grid;
      gap: var(--spacing-xl);
      align-content: start;
      max-width: var(--container-max);
      margin: 0 auto;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--spacing-md);
    }

    .topbar h2 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      color: var(--on-surface);
    }

    .topbar-content {
      flex: 1;
    }

    .user {
      color: var(--on-surface-variant);
      font-size: 13px;
      margin-top: 4px;
    }

    .user-section {
      color: var(--on-surface-variant);
      font-size: 14px;
      word-break: break-all;
      line-height: 1.5;
    }

    /* Stats Cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--spacing-lg);
    }

    .stat {
      background: var(--surface-container);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      box-shadow: 0 0 1px rgba(0, 0, 0, 0.4);
    }

    .stat-label {
      color: var(--on-surface-variant);
      font-size: 12px;
      font-weight: 600;
      line-height: 16px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .stat-value {
      display: block;
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
    }

    .stat-delta {
      font-size: 12px;
      color: var(--on-surface-variant);
    }

    /* Grid Layout */
    .grid {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      gap: var(--spacing-lg);
    }

    /* Cards/Panels */
    .panel {
      background: var(--surface-container);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 1px rgba(0, 0, 0, 0.4);
    }

    .panel h3 {
      margin: 0;
      padding: var(--spacing-lg);
      border-bottom: 1px solid var(--outline-variant);
      font-size: 18px;
      font-weight: 600;
      color: var(--on-surface);
      background: linear-gradient(180deg, var(--surface-container-high) 0%, var(--surface-container) 100%);
    }

    .panel-body {
      padding: var(--spacing-lg);
      flex: 1;
      overflow-y: auto;
    }

    .panel-body table {
      margin: calc(-1 * var(--spacing-lg));
      width: calc(100% + 2 * var(--spacing-lg));
    }

    .panel-body table th,
    .panel-body table td {
      padding: 12px var(--spacing-lg);
    }

    .actions {
      display: flex;
      gap: var(--spacing-sm);
      flex-wrap: wrap;
    }

    .row-actions {
      display: flex;
      gap: var(--spacing-sm);
    }

    .row-actions button {
      padding: 6px 12px;
      font-size: 12px;
    }

    /* Messages */
    .message {
      min-height: 20px;
      margin-top: var(--spacing-md);
      padding: 10px 12px;
      border-radius: var(--radius-base);
      color: var(--secondary);
      font-size: 13px;
      background: rgba(191, 198, 220, 0.1);
      border: 1px solid var(--secondary);
    }

    .message.error {
      color: var(--error);
      background: rgba(255, 180, 171, 0.1);
      border-color: var(--error);
    }

    .message:empty {
      display: none;
    }

    .hidden {
      display: none !important;
    }

    /* Status Badge */
    .status {
      display: inline-block;
      border-radius: var(--radius-full);
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--on-primary-container);
      background: var(--primary-container);
      white-space: nowrap;
    }

    .status.over_budget {
      color: var(--on-error-container);
      background: var(--error-container);
    }

    .status.within_budget {
      color: var(--on-surface-variant);
      background: var(--surface-container-high);
    }

    /* Responsive Design */
    @media (max-width: 1024px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--outline-variant);
        padding: var(--spacing-md);
      }

      .main {
        padding: var(--spacing-md);
        gap: var(--spacing-lg);
      }

      .topbar {
        flex-direction: column;
      }
    }

    @media (max-width: 640px) {
      .display-lg {
        font-size: 28px;
        line-height: 34px;
      }

      .topbar h2 {
        font-size: 24px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .tabs {
        grid-template-columns: 1fr 1fr;
      }

      .panel {
        border-radius: var(--radius-lg);
      }

      .sidebar {
        gap: var(--spacing-md);
      }

      .form {
        gap: var(--spacing-sm);
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 10px 8px;
      }

      button {
        padding: 8px 12px;
        font-size: 13px;
      }
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface-container-low);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--outline-variant);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--outline);
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>Fiscal</h1>
        <p>Expense &amp; Budget Tracker</p>
      </div>

      <div id="authBox">
        <div class="tabs">
          <button id="loginTab" class="active" type="button">Login</button>
          <button id="signupTab" type="button">Signup</button>
        </div>

        <form id="loginForm" class="form">
          <label>Email or username
            <input id="loginUsername" required autocomplete="username" placeholder="Enter email or username">
          </label>
          <label>Password
            <input id="loginPassword" type="password" required autocomplete="current-password" placeholder="Enter password">
          </label>
          <button type="submit">Login</button>
        </form>

        <form id="signupForm" class="form hidden">
          <label>Username
            <input id="signupUsername" required minlength="3" placeholder="Choose a username">
          </label>
          <label>Email
            <input id="signupEmail" type="email" required placeholder="Enter your email">
          </label>
          <label>Password
            <input id="signupPassword" type="password" required minlength="6" placeholder="Create a password">
          </label>
          <button type="submit">Create Account</button>
        </form>

        <div id="message" class="message"></div>
      </div>

      <div id="accountBox" class="hidden">
        <div class="user-section" id="accountText"></div>
        <div class="actions" style="margin-top: 16px; gap: 8px;">
          <button class="secondary" type="button" style="flex: 1;" onclick="openDocs()">API Docs</button>
          <button class="danger" type="button" style="flex: 1;" onclick="logout()">Logout</button>
        </div>
        <div id="message" class="message"></div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-content">
          <h2>Dashboard</h2>
          <div class="user" id="todayText"></div>
        </div>
        <div class="actions">
          <button class="secondary" type="button" onclick="loadAll()">↻ Refresh</button>
        </div>
      </div>

      <section class="stats">
        <div class="stat">
          <div class="stat-label">Total Spent</div>
          <div class="stat-value" id="totalSpent">0.00</div>
        </div>
        <div class="stat">
          <div class="stat-label">Expenses</div>
          <div class="stat-value" id="expenseCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Budgets</div>
          <div class="stat-value" id="budgetCount">0</div>
        </div>
      </section>

      <section class="grid">
        <div class="panel">
          <h3 id="expenseFormTitle">Add Expense</h3>
          <div class="panel-body">
            <form id="expenseForm" class="form">
              <input id="expenseId" type="hidden">
              <label>Title
                <input id="expenseTitle" required placeholder="e.g., Groceries">
              </label>
              <label>Amount
                <input id="expenseAmount" type="number" step="0.01" min="0" required placeholder="0.00">
              </label>
              <label>Category
                <input id="expenseCategory" required placeholder="e.g., Food">
              </label>
              <label>Date
                <input id="expenseDate" type="date" required>
              </label>
              <label>Note (Optional)
                <textarea id="expenseNote" rows="3" placeholder="Add a note..."></textarea>
              </label>
              <div class="actions">
                <button type="submit" style="flex: 1;">Save Expense</button>
                <button class="secondary" type="button" style="flex: 1;" onclick="resetExpenseForm()">Clear</button>
              </div>
            </form>
          </div>
        </div>

        <div class="panel">
          <h3>Recent Expenses</h3>
          <div class="panel-body">
            <table>
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Category</th>
                  <th>Date</th>
                  <th>Amount</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="expenseRows"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="grid">
        <div class="panel">
          <h3 id="budgetFormTitle">Add Budget</h3>
          <div class="panel-body">
            <form id="budgetForm" class="form">
              <input id="budgetId" type="hidden">
              <label>Category
                <input id="budgetCategory" required placeholder="e.g., Food">
              </label>
              <label>Limit Amount
                <input id="budgetAmount" type="number" step="0.01" min="0" required placeholder="0.00">
              </label>
              <label>Month
                <input id="budgetMonth" type="month" required>
              </label>
              <div class="actions">
                <button type="submit" style="flex: 1;">Save Budget</button>
                <button class="secondary" type="button" style="flex: 1;" onclick="resetBudgetForm()">Clear</button>
              </div>
            </form>
          </div>
        </div>

        <div class="panel">
          <h3>Budgets</h3>
          <div class="panel-body">
            <table>
              <thead>
                <tr>
                  <th>Category</th>
                  <th>Month</th>
                  <th>Limit</th>
                  <th>Spent</th>
                  <th>Remaining</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="budgetRows"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const tokenKey = "expense_tracker_token";
    const state = { expenses: [], budgets: [], summary: null, user: null };

    const money = new Intl.NumberFormat("en-IN", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    document.getElementById("todayText").textContent = new Date().toLocaleDateString("en-IN", {
      day: "2-digit",
      month: "short",
      year: "numeric"
    });
    document.getElementById("expenseDate").valueAsDate = new Date();
    document.getElementById("budgetMonth").value = new Date().toISOString().slice(0, 7);

    function token() {
      return localStorage.getItem(tokenKey);
    }

    function authHeaders() {
      return { Authorization: `Bearer ${token()}` };
    }

    function setMessage(text, isError = false) {
      const box = document.getElementById("message");
      box.textContent = text;
      box.classList.toggle("error", isError);
    }

    async function request(path, options = {}) {
      const response = await fetch(path, options);
      if (!response.ok) {
        let detail = "Request failed";
        try {
          const body = await response.json();
          detail = body.detail || detail;
        } catch (_) {}
        throw new Error(Array.isArray(detail) ? detail[0].msg : detail);
      }
      if (response.status === 204) return null;
      return response.json();
    }

    function showLogin() {
      document.getElementById("loginTab").classList.add("active");
      document.getElementById("signupTab").classList.remove("active");
      document.getElementById("loginForm").classList.remove("hidden");
      document.getElementById("signupForm").classList.add("hidden");
    }

    function showSignup() {
      document.getElementById("signupTab").classList.add("active");
      document.getElementById("loginTab").classList.remove("active");
      document.getElementById("signupForm").classList.remove("hidden");
      document.getElementById("loginForm").classList.add("hidden");
    }

    function setLoggedIn(isLoggedIn) {
      document.getElementById("authBox").classList.toggle("hidden", isLoggedIn);
      document.getElementById("accountBox").classList.toggle("hidden", !isLoggedIn);
    }

    async function login(event) {
      event.preventDefault();
      const form = new URLSearchParams();
      form.set("username", document.getElementById("loginUsername").value);
      form.set("password", document.getElementById("loginPassword").value);

      try {
        const data = await request("/login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: form
        });
        localStorage.setItem(tokenKey, data.access_token);
        setMessage("Logged in");
        await loadAll();
      } catch (error) {
        setMessage(error.message, true);
      }
    }

    async function signup(event) {
      event.preventDefault();
      try {
        await request("/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("signupUsername").value,
            email: document.getElementById("signupEmail").value,
            password: document.getElementById("signupPassword").value
          })
        });
        document.getElementById("loginUsername").value = document.getElementById("signupEmail").value;
        document.getElementById("loginPassword").value = document.getElementById("signupPassword").value;
        showLogin();
        setMessage("Account created. Login now.");
      } catch (error) {
        setMessage(error.message, true);
      }
    }

    async function saveExpense(event) {
      event.preventDefault();
      if (!token()) return setMessage("Login first", true);

      const id = document.getElementById("expenseId").value;
      const path = id ? `/expenses/${id}` : "/expenses";
      const method = id ? "PUT" : "POST";

      try {
        await request(path, {
          method,
          headers: { "Content-Type": "application/json", ...authHeaders() },
          body: JSON.stringify({
            title: document.getElementById("expenseTitle").value,
            amount: Number(document.getElementById("expenseAmount").value),
            category: document.getElementById("expenseCategory").value,
            spent_on: document.getElementById("expenseDate").value,
            note: document.getElementById("expenseNote").value || null
          })
        });
        resetExpenseForm();
        setMessage("Expense saved");
        await loadAll();
      } catch (error) {
        setMessage(error.message, true);
      }
    }

    async function saveBudget(event) {
      event.preventDefault();
      if (!token()) return setMessage("Login first", true);

      const id = document.getElementById("budgetId").value;
      const path = id ? `/budgets/${id}` : "/budgets";
      const method = id ? "PUT" : "POST";

      try {
        await request(path, {
          method,
          headers: { "Content-Type": "application/json", ...authHeaders() },
          body: JSON.stringify({
            category: document.getElementById("budgetCategory").value,
            limit_amount: Number(document.getElementById("budgetAmount").value),
            month: document.getElementById("budgetMonth").value
          })
        });
        resetBudgetForm();
        setMessage("Budget saved");
        await loadAll();
      } catch (error) {
        setMessage(error.message, true);
      }
    }

    function editExpense(id) {
      const expense = state.expenses.find(item => item.id === id);
      if (!expense) return;
      document.getElementById("expenseFormTitle").textContent = "Edit Expense";
      document.getElementById("expenseId").value = expense.id;
      document.getElementById("expenseTitle").value = expense.title;
      document.getElementById("expenseAmount").value = expense.amount;
      document.getElementById("expenseCategory").value = expense.category;
      document.getElementById("expenseDate").value = expense.spent_on;
      document.getElementById("expenseNote").value = expense.note || "";
    }

    function editBudget(id) {
      const budget = state.budgets.find(item => item.id === id);
      if (!budget) return;
      document.getElementById("budgetFormTitle").textContent = "Edit Budget";
      document.getElementById("budgetId").value = budget.id;
      document.getElementById("budgetCategory").value = budget.category;
      document.getElementById("budgetAmount").value = budget.limit_amount;
      document.getElementById("budgetMonth").value = budget.month;
    }

    async function deleteExpense(id) {
      try {
        await request(`/expenses/${id}`, { method: "DELETE", headers: authHeaders() });
        setMessage("Expense deleted");
        await loadAll();
      } catch (error) {
        setMessage(error.message, true);
      }
    }

    async function deleteBudget(id) {
      try {
        await request(`/budgets/${id}`, { method: "DELETE", headers: authHeaders() });
        setMessage("Budget deleted");
        await loadAll();
      } catch (error) {
        setMessage(error.message, true);
      }
    }

    function resetExpenseForm() {
      document.getElementById("expenseFormTitle").textContent = "Add Expense";
      document.getElementById("expenseForm").reset();
      document.getElementById("expenseId").value = "";
      document.getElementById("expenseDate").valueAsDate = new Date();
    }

    function resetBudgetForm() {
      document.getElementById("budgetFormTitle").textContent = "Add Budget";
      document.getElementById("budgetForm").reset();
      document.getElementById("budgetId").value = "";
      document.getElementById("budgetMonth").value = new Date().toISOString().slice(0, 7);
    }

    function render() {
      document.getElementById("totalSpent").textContent = money.format(state.summary?.total_spent || 0);
      document.getElementById("expenseCount").textContent = state.summary?.expenses_count || 0;
      document.getElementById("budgetCount").textContent = state.budgets.length;

      document.getElementById("expenseRows").innerHTML = state.expenses.map(expense => `
        <tr>
          <td>${escapeHtml(expense.title)}</td>
          <td>${escapeHtml(expense.category)}</td>
          <td>${escapeHtml(expense.spent_on)}</td>
          <td>${money.format(expense.amount)}</td>
          <td>
            <div class="row-actions">
              <button class="secondary" type="button" onclick="editExpense('${expense.id}')">Edit</button>
              <button class="danger" type="button" onclick="deleteExpense('${expense.id}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join("") || `<tr><td colspan="5" style="text-align: center; color: var(--on-surface-variant);">No expenses yet</td></tr>`;

      document.getElementById("budgetRows").innerHTML = state.budgets.map(budget => {
        const status = state.summary?.budgets.find(item => item.budget_id === budget.id);
        const statusLabel = status?.status || "within_budget";
        return `
          <tr>
            <td>${escapeHtml(budget.category)}</td>
            <td>${escapeHtml(budget.month)}</td>
            <td>${money.format(budget.limit_amount)}</td>
            <td>${money.format(status?.spent || 0)}</td>
            <td>${money.format(status?.remaining ?? budget.limit_amount)}</td>
            <td><span class="status ${statusLabel === "over_budget" ? "over_budget" : "within_budget"}">${statusLabel.replace(/_/g, " ")}</span></td>
            <td>
              <div class="row-actions">
                <button class="secondary" type="button" onclick="editBudget('${budget.id}')">Edit</button>
                <button class="danger" type="button" onclick="deleteBudget('${budget.id}')">Delete</button>
              </div>
            </td>
          </tr>
        `;
      }).join("") || `<tr><td colspan="7" style="text-align: center; color: var(--on-surface-variant);">No budgets yet</td></tr>`;

      if (state.user) {
        document.getElementById("accountText").textContent = `${state.user.username} - ${state.user.email}`;
      }
    }

    async function loadAll() {
      if (!token()) {
        setLoggedIn(false);
        render();
        return;
      }

      try {
        const [user, expenses, budgets, summary] = await Promise.all([
          request("/me", { headers: authHeaders() }),
          request("/expenses", { headers: authHeaders() }),
          request("/budgets", { headers: authHeaders() }),
          request("/summary", { headers: authHeaders() })
        ]);
        state.user = user;
        state.expenses = expenses;
        state.budgets = budgets;
        state.summary = summary;
        setLoggedIn(true);
        render();
      } catch (error) {
        localStorage.removeItem(tokenKey);
        setLoggedIn(false);
        setMessage("Please login again", true);
      }
    }

    function logout() {
      localStorage.removeItem(tokenKey);
      state.user = null;
      state.expenses = [];
      state.budgets = [];
      state.summary = null;
      setLoggedIn(false);
      render();
      setMessage("Logged out");
    }

    function openDocs() {
      window.open("/docs", "_blank");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("loginTab").addEventListener("click", showLogin);
    document.getElementById("signupTab").addEventListener("click", showSignup);
    document.getElementById("loginForm").addEventListener("submit", login);
    document.getElementById("signupForm").addEventListener("submit", signup);
    document.getElementById("expenseForm").addEventListener("submit", saveExpense);
    document.getElementById("budgetForm").addEventListener("submit", saveBudget);

    loadAll();
  </script>
</body>
</html>
